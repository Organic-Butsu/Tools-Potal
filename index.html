
<!DOCTYPE html>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#292f40;
color:white;
}

header{
text-align:center;
padding:35px 20px;
background:#1f2433;
}

h1{
margin:0;
font-size:30px;
}

.search{
text-align:center;
margin:25px;
}

.search input{
width:80%;
max-width:420px;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
background:#1f2433;
color:white;
outline:none;
}

.section{
padding:10px 30px 20px 30px;
}

.section h2{
margin-top:30px;
border-bottom:1px solid #444;
padding-bottom:6px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:#343b52;
padding:20px;
border-radius:12px;
text-align:center;
text-decoration:none;
color:white;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-5px);
background:#404864;
}

.card img{
width:42px;
height:42px;
}

.card p{
margin-top:10px;
font-size:14px;
}

footer{
text-align:center;
padding:30px;
color:#aab0c5;
}
.filters{
text-align:center;
margin-bottom:20px;
}

.filter{
padding:8px 14px;
margin:5px;
border:none;
border-radius:8px;
background:#333;
color:white;
cursor:pointer;
}

.filter:hover{
background:#444;
}

.filter.active{
background:#4c79ff;
}

</style>
</head>

<script>
const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");
const sections = document.querySelectorAll(".section");
const filters = document.querySelectorAll(".filter");

let currentCategory = "all";

function updateDisplay(){

let keyword = search.value.toLowerCase();

cards.forEach(card=>{

let text = card.innerText.toLowerCase();
let category = card.dataset.category;

let matchKeyword = text.includes(keyword);
let matchCategory = (currentCategory === "all" || category === currentCategory);

if(matchKeyword && matchCategory){
card.style.display="";
}else{
card.style.display="none";
}

});


sections.forEach(section=>{

const visibleCards = section.querySelectorAll(".card:not([style*='display: none'])");

if(visibleCards.length === 0){
section.style.display="none";
}else{
section.style.display="";
}

});

}

let keyword = search.value.toLowerCase();

cards.forEach(card=>{

let text = card.innerText.toLowerCase();

if(text.includes(keyword)){
card.style.display="";
}else{
card.style.display="none";
}

});
sections.forEach(section=>{

const visibleCards = section.querySelectorAll(".card:not([style*='display: none'])");

if(visibleCards.length === 0){
section.style.display="none";
}

});




search.addEventListener("input", updateDisplay);

filters.forEach(button=>{

button.addEventListener("click",()=>{

filters.forEach(btn=>btn.classList.remove("active"));
button.classList.add("active");

currentCategory = button.dataset.category;

updateDisplay();

});

});


</script>
